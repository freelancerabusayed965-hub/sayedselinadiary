
</html>
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভালোবাসার পূর্ণতা - নূর AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314; /* Gemini Background */
            --card-bg: #1e1f20;
            --gemini-blue: #4285f4;
            --soft-gold: #c9a84c;
            --text-main: #e3e3e3;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Top Header */
        .header {
            padding: 15px; text-align: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid #333;
        }

        .shimmer-title {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; padding: 15px; overflow-y: auto;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid #333; border-radius: 12px;
            padding: 20px 10px; text-align: center;
            font-size: 0.85rem; cursor: pointer;
            transition: 0.3s;
        }

        .menu-item:hover { border-color: var(--gemini-blue); background: #2a2b2d; }

        /* Gemini Chat Modal */
        .chat-window {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 70vh; background: var(--bg-dark);
            border-top: 1px solid #444; border-radius: 25px 25px 0 0;
            display: none; flex-direction: column; z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }

        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.95rem; }

        .input-area {
            padding: 15px; background: #1e1f20;
            margin: 10px 15px 25px; border-radius: 30px;
            display: flex; align-items: center; border: 1px solid #444;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; padding-left: 10px;
        }

        /* Floating AI Button */
        .noor-btn {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; background: var(--gemini-blue);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }

        .typing-effect::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="shimmer-title">ভালোবাসার পূর্ণতা</div>
        <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">সাঈদ & হাবিবা ডায়েরি</div>
    </div>

    <div class="dashboard">
        <div class="menu-item" onclick="showInfo('marriage')">৬. বন্ধনের কাবিননামা</div>
        <div class="menu-item" onclick="alert('শীঘ্রই আসছে...')">১. আমাদের দোয়া</div>
        <div class="menu-item" onclick="alert('শীঘ্রই আসছে...')">৩. স্মৃতির পাতা</div>
        <div class="menu-item" onclick="alert('শীঘ্রই আসছে...')">৮. প্রতিদিনের নেক আমল</div>
        <div class="menu-item" onclick="alert('শীঘ্রই আসছে...')">১৩. আমাদের ঘর</div>
        <div class="menu-item" style="border: 1px dashed #555;" onclick="alert('🔐 লক করা')">১৫. গোপন সিন্দুক</div>
    </div>

    <div class="chat-window" id="chatWin">
        <div style="padding: 15px; text-align: center; border-bottom: 1px solid #333;">
            <span style="font-weight: 600;">নূর সহায়িকা</span>
            <span onclick="toggleChat()" style="float: right; cursor: pointer;">✕</span>
        </div>
        <div id="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="নূর-কে কিছু জিজ্ঞেস করুন...">
            <button onclick="askNoor()" style="background: none; border: none; color: var(--gemini-blue); font-weight: bold; cursor: pointer;">প্রেরণ</button>
        </div>
    </div>

    <div class="noor-btn" onclick="toggleChat()">🌙</div>

    <script>
        // সাঈদ ভাই, আপনার সঠিক Worker URL এখানে বসিয়ে দিলাম
        const workerUrl = "https://noor-ai.freelancerabusayed965.workers.dev";

        function toggleChat() {
            const win = document.getElementById('chatWin');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function showInfo(type) {
            if(type === 'marriage') {
                alert("সাঈদ ভাই, মোহরানা তথ্য:\nমোট: ২,০০,০০০৳\nউশুল (নগদ): ৫,০০০৳\nতারিখ: ১২/১২/২০২৫");
            }
        }

        async function askNoor() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-messages');
            const msg = input.value;
            if(!msg) return;

            chatBox.innerHTML += `<div style="margin-bottom:15px; color: #888;"><b>আপনি:</b> ${msg}</div>`;
            input.value = '';

            const noorDiv = document.createElement('div');
            noorDiv.style.marginBottom = "20px";
            noorDiv.innerHTML = `<b style="color: var(--gemini-blue)">নূর:</b> <span id="typing">...</span>`;
            chatBox.appendChild(noorDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: msg }] })
                });
                
                const data = await response.json();
                const reply = data.content[0].text;
                
                // Gemini Style Typing Effect
                let i = 0;
                const target = document.getElementById('typing');
                target.id = ''; // Remove ID for next messages
                target.innerText = '';
                target.classList.add('typing-effect');

                function typeWriter() {
                    if (i < reply.length) {
                        target.innerText += reply.charAt(i);
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(typeWriter, 20);
                    } else {
                        target.classList.remove('typing-effect');
                    }
                }
                typeWriter();

            } catch (e) {
                document.getElementById('typing').innerText = "সাঈদ ভাই, আপনার সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।";
            }
        }
    </script>
</body>
</html>
